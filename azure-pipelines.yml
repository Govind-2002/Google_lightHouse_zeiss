trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  LIGHTHOUSE_URL: "http://104.211.61.92:4008"
  TARGET_URL: "https://github.com"

steps:

# Install jq
- script: |
    sudo apt-get update
    sudo apt-get install -y jq
  displayName: "Install jq"

# Trigger Audit and Wait Automatically
- script: |
    echo "Triggering Lighthouse audit and waiting for completion..."

    RESPONSE=$(curl -s -X POST $(LIGHTHOUSE_URL)/v1/audits \
      -H "Content-Type: application/json" \
      -d "{\"url\":\"$(TARGET_URL)\",\"awaitAuditCompleted\":true}")

    echo "$RESPONSE" > full-report.json

    echo "Audit finished."
    cat full-report.json
  displayName: "Run Lighthouse Audit"

# Generate Summary
- script: |
    echo "Generating summary..."

    jq '{
      id: .id,
      url: .url,
      status: .status,
      timeCreated: .timeCreated,
      timeCompleted: .timeCompleted,
      categories: (
        .report.categories
        | with_entries({ key: .key, value: { score: .value.score } })
      )
    }' full-report.json > summary.json

    echo "Summary:"
    cat summary.json
  displayName: "Generate Summary"

# Publish Artifact
- publish: summary.json
  artifact: LighthouseReport