# yaml-language- server:    $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/main/src/schemas/json/azure-pipelines.json


trigger:
- lighthouse-setup

schedules:
- cron: "30 2 * * *"
  displayName: Every 10 Min Lighthouse Audit
  branches:
    include:
      - lighthouse-setup
  always: true





pool:
  vmImage: 'ubuntu-latest'

variables:
  LIGHTHOUSE_URL: "http://104.211.61.92:4008"
  TARGET_URL: "https://github.com"

steps:

# Install jq
- script: |
    sudo apt-get update
    sudo apt-get install -y jq
  displayName: "Install jq"

- script: |
    echo "Triggering Lighthouse audit..."

    echo "LIGHTHOUSE_URL: $(LIGHTHOUSE_URL)"
    echo "TARGET_URL: $(TARGET_URL)"

    echo "Checking connectivity..."
    curl -v $(LIGHTHOUSE_URL) || echo "Base URL not reachable"

    echo "Sending POST request..."

    RESPONSE=$(curl -v \
      -X POST $(LIGHTHOUSE_URL)/v1/audits \
      -H "Content-Type: application/json" \
      -H "Accept: application/json" \
      -d "{\"url\":\"$(TARGET_URL)\"}")

    echo "Raw RESPONSE:"
    echo "$RESPONSE"

    if [ -z "$RESPONSE" ]; then
      echo "ERROR: Empty response from Lighthouse API"
      exit 1
    fi

    AUDIT_ID=$(echo "$RESPONSE" | jq -r '.id')

    echo "Audit ID: $AUDIT_ID"

    if [ "$AUDIT_ID" = "null" ]; then
      echo "ERROR: Audit ID is null"
      exit 1
    fi

    STATUS="RUNNING"

    while [ "$STATUS" = "RUNNING" ]; do
      sleep 10

      RESULT=$(curl -v \
        -H "Accept: application/json" \
        $(LIGHTHOUSE_URL)/v1/audits/$AUDIT_ID)

      echo "Raw RESULT:"
      echo "$RESULT"

      if [ -z "$RESULT" ]; then
        echo "ERROR: Empty result received"
        exit 1
      fi

      STATUS=$(echo "$RESULT" | jq -r '.status')

      echo "Current status: $STATUS"
    done

    echo "$RESULT" > full-report.json

    echo "Final Report saved."
  displayName: "Trigger + Wait for Lighthouse Audit"


#validatig json
- script: |
    echo "Validating JSON..."

    jq . full-report.json || { echo "Invalid JSON received"; exit 1; }
  displayName: "Validate JSON"

# Generate Summary
- script: |
    echo "Generating summary..."

    jq '{
      id: .id,
      url: .url,
      status: .status,
      timeCreated: .timeCreated,
      timeCompleted: .timeCompleted,
      categories: (
        .report.categories
        | with_entries({ key: .key, value: { score: .value.score } })
      )
    }' full-report.json > summary.json

    echo "Summary:"
    cat summary.json
  displayName: "Generate Summary"

# Publish Artifact
- publish: summary.json
  artifact: LighthouseReport