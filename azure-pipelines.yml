trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  LIGHTHOUSE_URL: "http://104.211.61.92:4008"
  TARGET_URL: "https://github.com"

steps:

# Install jq
- script: |
    sudo apt-get update
    sudo apt-get install -y jq
  displayName: "Install dependencies"

# Trigger Audit + Wait Until Completed
- script: |
    echo "Triggering Lighthouse audit..."

    # Step 1: Trigger audit
    RESPONSE=$(curl -s -X POST $(LIGHTHOUSE_URL)/v1/audits \
      -H "Content-Type: application/json" \
      -d "{\"url\":\"$(TARGET_URL)\"}")

    echo "$RESPONSE" > initial-response.json

    AUDIT_ID=$(jq -r '.id' initial-response.json)
    echo "Audit ID: $AUDIT_ID"

    # Step 2: Poll until completed
    echo "Waiting for audit completion..."

    while true; do
      STATUS_RESPONSE=$(curl -s $(LIGHTHOUSE_URL)/v1/audits/$AUDIT_ID)
      STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')

      echo "Current status: $STATUS"

      if [ "$STATUS" = "COMPLETED" ]; then
        echo "$STATUS_RESPONSE" > full-report.json
        echo "Audit completed successfully."
        break
      fi

      if [ "$STATUS" = "FAILED" ]; then
        echo "Audit failed."
        exit 1
      fi

      sleep 10
    done
  displayName: "Run Lighthouse Audit (Wait for Completion)"

# Generate Summary JSON
- script: |
    echo "Generating summary..."

    jq '{
      id: .id,
      url: .url,
      status: .status,
      timeCreated: .timeCreated,
      timeCompleted: .timeCompleted,
      categories: (
        .report.categories
        | with_entries({ key: .key, value: { score: .value.score } })
      )
    }' full-report.json > summary.json

    echo "Summary:"
    cat summary.json
  displayName: "Generate Summary"

# Publish Artifact
- publish: summary.json
  artifact: LighthouseReport
