trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  LIGHTHOUSE_URL: "http://104.211.61.92:4008"
  TARGET_URL: "https://github.com"

steps:

- script: |
    sudo apt-get update
    sudo apt-get install -y jq
  displayName: "Install dependencies"

- script: |
    echo "Triggering Lighthouse audit..."

    RESPONSE=$(curl -s -X POST $(LIGHTHOUSE_URL)/v1/audits \
      -H "Content-Type: application/json" \
      -d "{\"url\":\"$(TARGET_URL)\",\"awaitAuditCompleted\":true}")

    echo "$RESPONSE" > full-report.json

    echo "Audit completed."
    cat full-report.json
  displayName: "Run Lighthouse Audit"

- script: |
    jq '{
      id: .id,
      url: .url,
      status: .status,
      timeCreated: .timeCreated,
      timeCompleted: .timeCompleted,
      categories: {
        performance: { score: .report.categories.performance.score },
        accessibility: { score: .report.categories.accessibility.score },
        "best-practices": { score: .report.categories["best-practices"].score },
        seo: { score: .report.categories.seo.score }
      }
    }' full-report.json > summary.json

    echo "Summary:"
    cat summary.json
  displayName: "Generate Summary"

- publish: summary.json
  artifact: LighthouseReport
