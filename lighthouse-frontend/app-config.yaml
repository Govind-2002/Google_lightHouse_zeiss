app:
  title: Scaffolded Backstage App
  baseUrl: http://localhost:3000
  packages: all

organization:
  name: My Company

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007

  auth:
    keys:
      - secret: "super-secret-development-key"

  experimental:
    disableAuth: true  # DEV ONLY

  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: better-sqlite3
    connection: ':memory:'

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

# ✅ PROXY CONFIGURATION (IMPORTANT)
proxy:
  endpoints:
    '/lighthouse':
      target: http://localhost:4008
      changeOrigin: true
      secure: false

techdocs:
  builder: local
  generator:
    runIn: docker
  publisher:
    type: local

auth:
  providers:
    guest: {}

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    - type: file
      target: ../../examples/entities.yaml

    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]



permission:
  enabled: true

# ✅ CHANGE THIS — DO NOT USE PUBLIC IP DIRECTLY
lighthouse:
  baseUrl: /api/proxy/lighthouse