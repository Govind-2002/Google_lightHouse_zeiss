# yaml-language-server: $schema=https://backstage.io/schema/app-config.schema.json
# Note: Schema validation is disabled due to connectivity issues. Uncomment the line above when connectivity is restored.
app:
  title: Scaffolded Backstage App
  signInPage: guest
  branding:
    logo:
      light: /Zeiss.png
      dark: /Zeiss.png
    icon: /Zeiss.png
  baseUrl: http://localhost:3000

organization:
  name: My Company

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    frame-src:
      - 'self'
      - http://localhost:4008 # The target of your lighthouse proxy
      - http://localhost:7007 # The backend proxy itself
    # frame-ancestors controls who is ALLOWED to embed the iframe
    img-src: ["'self'", 'data:', 'http:', 'https:']
    script-src: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
    style-src: ["'self'", "'unsafe-inline'"]
    # ADD THIS LINE:
    frame-ancestors: ["'self'", "http://localhost:3000"]

  auth:
   # dangerouslyDisableDefaultAuthPolicy: true
    keys:
      - secret: "super-secret-development-key"

  #experimental:
  #  disableAuth: true

  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: better-sqlite3
    connection:
      directory: ./backstage-data


proxy:
  reviveConsumedRequestBodies: true
  endpoints:
    /lighthouse:
      target: http://localhost:4008
      changeOrigin: true
      secure: false
      credentials: dangerously-allow-unauthenticated


integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}


techdocs:
  builder: local
  generator:
    runIn: docker
  publisher:
    type: local


auth:
  environment: development
  providers:
    guest: {}
     # dangerouslyAllowOutsideDevelopment: true

scaffolder: {}


catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    - type: file
      target: ../../examples/entities.yaml

    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]


permission:
  enabled: true


lighthouse:
  baseUrl: http://localhost:7007/api/proxy/lighthouse

