apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      initContainers:
        - name: create-backstage-db
          image: postgres:15
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER"; do
                echo "Waiting for postgres…"; sleep 3
              done
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres -U "$POSTGRES_USER" -d "$PGDATABASE" -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'backstage'" | grep -q 1 || \
              PGPASSWORD="$POSTGRES_PASSWORD" createdb -h postgres -U "$POSTGRES_USER" backstage
              echo "backstage database ready"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lighthouse-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lighthouse-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: lighthouse-secrets
                  key: POSTGRES_DB
      containers:
        - name: backstage
          image: aishjp/backstage:20260309-aks4
          imagePullPolicy: Always
          ports:
            - containerPort: 7007
          env:
            - name: BACKSTAGE_BASE_URL
              value: http://backstage.20.103.52.125.nip.io
            - name: APP_CONFIG_backend_auth_dangerouslyDisableDefaultAuthPolicy
              value: "true"
            - name: APP_CONFIG_auth_providers_guest_dangerouslyAllowOutsideDevelopment
              value: "true"
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lighthouse-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lighthouse-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: backstage
            - name: NODE_ENV
              value: production
          readinessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
spec:
  selector:
    app: backstage
  ports:
    - name: http
      port: 7007
      targetPort: 7007
  type: ClusterIP
